<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sinuciderea lui Hitler - 30 aprilie 1945</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
  <style>
    body { font-family: 'Open Sans', sans-serif; background-color: #f5f5f5; color: #333; }
    h1, h2, h3 { font-family: 'Lora', serif; }
    .header { background: linear-gradient(135deg, #212121 0%, #000000 100%); color: white; padding: 60px 20px; text-align: center; }
    .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
    .header p { font-size: 1.1rem; opacity: 0.9; }
    .content { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    .section { background: white; padding: 30px; margin-bottom: 30px; border-left: 4px solid #212121; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .section h2 { color: #212121; font-size: 1.8rem; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #e0e0e0; }
    .section p { line-height: 1.8; margin-bottom: 15px; font-size: 1rem; }
    .timeline-item { padding-left: 40px; padding-bottom: 30px; border-left: 2px solid #bdc3c7; position: relative; margin-bottom: 20px; }
    .timeline-item:before { content: ""; position: absolute; left: -8px; top: 0; width: 14px; height: 14px; background: #212121; border-radius: 50%; }
    .timeline-date { font-weight: 600; color: #212121; font-size: 1.1rem; }
    .timeline-text { color: #555; margin-top: 5px; }
    .quote { background: #e0e0e0; padding: 20px; margin: 20px 0; border-left: 4px solid #212121; font-style: italic; color: #212121; }
    .footer { background: #212121; color: white; text-align: center; padding: 30px 20px; margin-top: 50px; font-size: 0.9rem; }
    .reference { background: #f9f9f9; padding: 15px; margin: 10px 0; border-left: 3px solid #95a5a6; font-size: 0.95rem; }
    .nav-link { color: #212121; text-decoration: none; font-weight: 600; }
    .nav-link:hover { text-decoration: underline; }
