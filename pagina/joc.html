<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quiz WWII - Difcultăți</title>
  <style>
    /* Reset simplu */
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1b2a1f, #0f1a14);
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 10px;
    }

    .container {
      width: 100%;
      max-width: 540px;
      background: #1f2f25;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 0 20px rgba(0,255,100,0.12);
    }

    h2 { font-size: 1.4rem; margin-bottom: 12px; }

    .difficulty-row {
      display:flex;
      gap:8px;
      margin-bottom: 12px;
    }

    .diff-btn {
      flex:1;
      padding: 10px;
      border-radius:8px;
      border:none;
      cursor:pointer;
      font-weight:600;
    }
    .easy { background:#2f6f3f; color:#fff; }
    .medium { background:#6f5f2f; color:#fff; }
    .hard { background:#6f2f2f; color:#fff; }

    button.answer {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      background: #2e4f3b;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.18s;
    }
    button.answer:hover { background: #3f6f54; }

    .status {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
      font-size: 1rem;
    }

    #timer { font-weight: bold; color: #00ff99; }

    .meta {
      display:flex;
      justify-content:space-between;
      gap:8px;
      margin-top:12px;
      align-items:center;
    }
    .small {
      font-size:0.9rem;
      color:#cfcfcf;
    }
    .controls {
      display:flex;
      gap:8px;
      margin-top:10px;
    }
    .control-btn {
      padding:8px 10px;
      border-radius:8px;
      border:none;
      cursor:pointer;
      background:#3b4b3b;
      color:#fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="difficulty-row" id="difficultyRow">
      <button class="diff-btn easy" id="btnEasy">Easy</button>
      <button class="diff-btn medium" id="btnMedium">Medium</button>
      <button class="diff-btn hard" id="btnHard">Beje-mode</button>
    </div>

    <h2 id="intrebare">Alege un nivel de dificultate pentru a începe</h2>
    <div id="raspunsuri"></div>

    <div class="status">
      <span>❤️ Vieți: <span id="vieti">-</span></span>
      <span>⭐ Scor: <span id="scor">0</span></span>
      <span>⏱️ <span id="timer">-</span>s</span>
    </div>

    <div class="meta">
      <div class="small" id="infoDiff">Nivel: - · Puncte: - · Timp/întrebare: -s</div>
      <div class="controls">
        <button class="control-btn" id="btnRestart" disabled>Reîncepe</button>
        <button class="control-btn" id="btnChange" >Schimbă nivel</button>
      </div>
    </div>
  </div>

  <audio id="corect" src="sounds/correct.mp3"></audio>
  <audio id="gresit" src="sounds/wrong.mp3"></audio>
  <audio id="gameover" src="sounds/gameover.mp3"></audio>

  <script>
    // Întrebările inițiale (folosim ordonarea lor pentru a le grupa pe nivele).
    const intrebari = [
      { q:"În ce an a început Al Doilea Război Mondial?", a:["1938","1939","1940","1941"], corect:1 },
      { q:"Ce țară a invadat Polonia în 1939?", a:["URSS","Germania","Italia","Japonia"], corect:1 },
      { q:"Cine era liderul Germaniei naziste?", a:["Stalin","Hitler","Churchill","Roosevelt"], corect:1 },
      { q:"Ce alianță făcea parte Germania?", a:["Antanta","Axa","ONU","NATO"], corect:1 },
      { q:"Ce eveniment a atras SUA în război?", a:["Normandia","Pearl Harbor","Stalingrad","Berlin"], corect:1 },
      { q:"În ce an s-a încheiat războiul?", a:["1943","1944","1945","1946"], corect:2 },
      { q:"Care a fost capitala Germaniei naziste?", a:["Munchen","Hamburg","Berlin","Bonn"], corect:2 },
      { q:"Ce țară a fost condusă de Mussolini?", a:["Spania","Italia","Franța","Grecia"], corect:1 },
      { q:"Bătălia de la Stalingrad a fost între?", a:["Germania–SUA","URSS–Germania","UK–Italia","Japonia–SUA"], corect:1 },
      { q:"Debarcarea din Normandia a avut loc în?", a:["1942","1943","1944","1945"], corect:2 },
      { q:"Ce lider a condus URSS?", a:["Lenin","Troțki","Stalin","Hrușciov"], corect:2 },
      { q:"Ce țară a atacat Pearl Harbor?", a:["China","Japonia","Germania","Coreea"], corect:1 },
      { q:"Cum se numea alianța SUA–UK–URSS?", a:["Axa","Aliații","Tripla","Liga"], corect:1 },
      { q:"România a luptat inițial alături de?", a:["URSS","Germania","SUA","Franța"], corect:1 },
      { q:"România a întors armele în?", a:["1942","1943","1944","1945"], corect:2 },

      { q:"Ce oraș a fost bombardat atomic?", a:["Tokyo","Hiroshima","Osaka","Kyoto"], corect:1 },
      { q:"Al doilea oraș bombardat atomic?", a:["Nagasaki","Kobe","Tokyo","Hanoi"], corect:0 },
      { q:"Cine era premierul Marii Britanii?", a:["Chamberlain","Churchill","Thatcher","Blair"], corect:1 },
      { q:"Ce front NU a existat?", a:["Est","Vest","Sud","Nord"], corect:3 },
      { q:"Operațiunea Barbarossa a fost?", a:["Invazia URSS","Atacul SUA","Apărarea Berlinului","Normandia"], corect:0 },
      { q:"Ce țară a fost neutră?", a:["Elveția","Polonia","Franța","Grecia"], corect:0 },
      { q:"Cine era președintele SUA?", a:["Lincoln","Roosevelt","Truman","Wilson"], corect:1 },
      { q:"Ce oraș a căzut în 1945?", a:["Paris","Roma","Berlin","Viena"], corect:2 },
      { q:"Ce mare bătălie navală a avut loc?", a:["Midway","Waterloo","Somme","Verdun"], corect:0 },
      { q:"Ce țară a fost ocupată rapid?", a:["Franța","UK","URSS","SUA"], corect:0 },
      { q:"Gestapo era?", a:["Armată","Poliție secretă","Partid","Alianță"], corect:1 },
      { q:"Luftwaffe era?", a:["Marină","Aviație","Infanterie","Poliție"], corect:1 },
      { q:"Ziua Z este?", a:["Invazia Normandiei","Căderea Berlinului","Pearl Harbor","Stalingrad"], corect:0 },
      { q:"Ce țară NU făcea parte din Axa?", a:["Germania","Italia","Japonia","Franța"], corect:3 },
      { q:"Holocaustul a fost?", a:["O bătălie","Un genocid","Un tratat","O alianță"], corect:1 },

      { q:"Lagărele de concentrare erau?", a:["Școli","Închisori","Spitale","Baze"], corect:1 },
      { q:"Ce țară a fost divizată după război?", a:["Italia","Germania","Franța","Spania"], corect:1 },
      { q:"Ce conferință a decis Europa postbelică?", a:["Yalta","Paris","Roma","Londra"], corect:0 },
      { q:"Ce armă nouă a apărut?", a:["Tanc","Gaz","Atomică","Arc"], corect:2 },
      { q:"ONU s-a format în?", a:["1944","1945","1946","1947"], corect:1 },
      { q:"Care a fost liderul Japoniei?", a:["Împăratul","Prim-ministrul","Generalul","Regele"], corect:0 },
      { q:"Care a fost cea mai mare bătălie?", a:["Stalingrad","Midway","Normandia","El Alamein"], corect:0 },
      { q:"Ce țară a fost invadată de URSS?", a:["Finlanda","Italia","Spania","UK"], corect:0 },
      { q:"Care a fost scopul Normandiei?", a:["Apărare","Eliberare Franța","Atac URSS","Bombardare"], corect:1 },
      { q:"Războiul a durat?", a:["4 ani","5 ani","6 ani","7 ani"], corect:2 }
    ];

    // Configurare nivele - timp pe întrebare, vieți, puncte per răspuns corect, câte întrebări (-1 = toate)
    const dificultati = {
      easy:   { time: 20, vies: 5, points: 5, questionsCount: 10 },
      medium: { time: 10, vies: 3, points: 10, questionsCount: 15 },
      hard:   { time: 5,  vies: 1, points: 20, questionsCount: -1 }
    };

    // Elemente DOM
    const btnEasy = document.getElementById('btnEasy');
    const btnMedium = document.getElementById('btnMedium');
    const btnHard = document.getElementById('btnHard');
    const btnRestart = document.getElementById('btnRestart');
    const btnChange = document.getElementById('btnChange');

    const intrebareEl = document.getElementById('intrebare');
    const raspunsuriEl = document.getElementById('raspunsuri');
    const vietiEl = document.getElementById('vieti');
    const scorEl = document.getElementById('scor');
    const timerEl = document.getElementById('timer');
    const infoDiffEl = document.getElementById('infoDiff');

    const corectAudio = document.getElementById('corect');
    const gresitAudio = document.getElementById('gresit');
    const gameoverAudio = document.getElementById('gameover');

    // Starea jocului
    let currentQuestions = [];
    let index = 0;
    let vieti = 0;
    let scor = 0;
    let timp = 0;
    let timer = null;
    let currentDiffKey = null;
    let config = null;

    // Categorizează întrebările pe nivele pe baza ordinii (prima parte easy, următoarea medium, rest hard).
    function categorizeQuestions() {
      return {
        easy: intrebari.filter((_, i) => i < 15),
        medium: intrebari.filter((_, i) => i >= 15 && i < 30),
        hard: intrebari.filter((_, i) => i >= 30)
      };
    }

    // Shuffle Fisher–Yates
    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function startGame(diffKey) {
      clearInterval(timer);
      currentDiffKey = diffKey;
      config = dificultati[diffKey];

      const cats = categorizeQuestions();
      let pool = cats[diffKey] && cats[diffKey].length ? cats[diffKey].slice() : intrebari.slice();
      pool = shuffle(pool);

      // reduce la numărul cerut de întrebări (dacă e cazul)
      if (config.questionsCount > 0 && pool.length > config.questionsCount) {
        pool = pool.slice(0, config.questionsCount);
      }

      currentQuestions = pool;
      index = 0;
      vieti = config.vies;
      scor = 0;
      timp = config.time;

      updateInfo();
      btnRestart.disabled = false;
      document.getElementById('difficultyRow').style.display = 'none';
      afiseazaIntrebare();
    }

    function updateInfo() {
      vietiEl.textContent = vieti;
      scorEl.textContent = scor;
      timerEl.textContent = timp;
      infoDiffEl.textContent = `Nivel: ${capitalize(currentDiffKey || '-') } · Puncte/corect: ${config ? config.points : '-'} · Timp/întrebare: ${config ? config.time+'s': '-'}`;
    }

    function afiseazaIntrebare() {
      clearInterval(timer);

      if (vieti <= 0) {
        finishGame();
        return;
      }

      if (index >= currentQuestions.length) {
        // ai terminat toate întrebările selectate -> joc câștigat/terminat
        finishGame(true);
        return;
      }

      const item = currentQuestions[index];
      timp = config.time;
      intrebareEl.textContent = item.q;
      raspunsuriEl.innerHTML = '';

      item.a.forEach((rasp, i) => {
        const btn = document.createElement('button');
        btn.className = 'answer';
        btn.textContent = rasp;
        btn.onclick = () => verifica(i);
        raspunsuriEl.appendChild(btn);
      });

      updateInfo();

      timer = setInterval(() => {
        timp--;
        timerEl.textContent = timp;
        if (timp <= 0) {
          clearInterval(timer);
          vieti--;
          gresitAudio.play().catch(()=>{});
          index++;
          updateInfo();
          // mic delay pentru a evita multiple schimbări rapide
          setTimeout(afiseazaIntrebare, 500);
        }
      }, 1000);
    }

    function verifica(i) {
      clearInterval(timer);
      const item = currentQuestions[index];
      if (!item) return;
      if (i === item.corect) {
        scor += config.points;
        corectAudio.play().catch(()=>{});
      } else {
        vieti--;
        gresitAudio.play().catch(()=>{});
      }
      index++;
      updateInfo();
      setTimeout(afiseazaIntrebare, 300);
    }

    function finishGame(won = false) {
      clearInterval(timer);
      if (vieti <= 0) {
        gameoverAudio.play().catch(()=>{});
        alert(`Joc terminat! Ai rămas fără vieți. Scor final: ${scor}`);
      } else if (won) {
        corectAudio.play().catch(()=>{});
        alert(`Felicitări! Ai terminat nivelul ${capitalize(currentDiffKey)}. Scor: ${scor}`);
      } else {
        alert(`Joc terminat! Scor final: ${scor}`);
      }
      // Permitem schimbarea nivelului
      document.getElementById('difficultyRow').style.display = '';
      btnRestart.disabled = true;
      intrebareEl.textContent = 'Alege un nivel de dificultate pentru a începe';
      raspunsuriEl.innerHTML = '';
      vietiEl.textContent = '-';
      timerEl.textContent = '-';
      infoDiffEl.textContent = 'Nivel: - · Puncte: - · Timp/întrebare: -s';
    }

    function capitalize(s) {
      if (!s) return s;
      return s.charAt(0).toUpperCase() + s.slice(1);
    }

    // Butoane
    btnEasy.addEventListener('click', () => startGame('easy'));
    btnMedium.addEventListener('click', () => startGame('medium'));
    btnHard.addEventListener('click', () => startGame('hard'));

    btnRestart.addEventListener('click', () => {
      if (!currentDiffKey) return;
      startGame(currentDiffKey);
    });

    btnChange.addEventListener('click', () => {
      // permite jucătorului să revină la alegerea dificultații
      clearInterval(timer);
      document.getElementById('difficultyRow').style.display = '';
      btnRestart.disabled = true;
      intrebareEl.textContent = 'Alege un nivel de dificultate pentru a începe';
      raspunsuriEl.innerHTML = '';
      vietiEl.textContent = '-';
      timerEl.textContent = '-';
      infoDiffEl.textContent = 'Nivel: - · Puncte: - · Timp/întrebare: -s';
    });

    // Dezactivăm autoplay audio errors în console în cazul în care fișierele lipsesc
    corectAudio.play = corectAudio.play.bind(corectAudio);
    gresitAudio.play = gresitAudio.play.bind(gresitAudio);
    gameoverAudio.play = gameoverAudio.play.bind(gameoverAudio);
  </script>
</body>
</html>
