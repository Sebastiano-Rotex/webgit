<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Meniu Navigare</title>
  <meta name="robots" content="noindex,nofollow" />
  <style>
    :root{
      --nav-width: 300px;
      --bg1: #0f1b18;
      --bg2: #122620;
      --accent: #ffd54f;
      --muted: #dfeee3;
      --hover: rgba(255,213,79,0.06);
      --focus: 3px solid rgba(255,213,79,0.16);
    }
    html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;color:var(--muted);background:linear-gradient(180deg,var(--bg1),var(--bg2));}
    nav{box-sizing:border-box;padding:18px;max-width:var(--nav-width);width:100%;height:100%;display:flex;flex-direction:column;gap:12px}
    .brand{display:flex;gap:12px;align-items:center}
    .medal{width:46px;height:46px;border-radius:10px;background:linear-gradient(180deg,#6b7a3a,#1b1e19);display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff}
    h1{margin:0;font-size:1.05rem}
    .controls{display:flex;gap:8px;align-items:center}
    .search{flex:1;padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:var(--muted)}
    .pin-btn{padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:var(--muted);cursor:pointer}
    .pin-btn.active{background:var(--accent);color:#111;font-weight:700}
    .links{overflow:auto;padding:6px 2px 12px 0;border-radius:8px}
    ul { list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:6px }
    li a { display:block;padding:10px 12px;border-radius:8px;color:var(--muted);text-decoration:none;font-weight:700 }
    li a:hover, li a:focus { background:var(--hover); color:#fff; outline:none }
    li a.active { background: linear-gradient(90deg,var(--accent),#ffb347); color:#07120a; box-shadow: 0 8px 20px rgba(0,0,0,0.35) }
    .footer { margin-top:auto; font-size:0.92rem; color:rgba(255,255,255,0.7) }
    .hint { font-size:12px;color:rgba(255,255,255,0.6) }
    .sr-only{position:absolute!important;height:1px;width:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

    /* focus outline for keyboard users */
    a:focus, button:focus, input:focus { outline: var(--focus); outline-offset: 3px; }

    /* responsive */
    @media (max-width:520px) {
      nav{padding:12px}
      .medal{width:40px;height:40px}
    }
  </style>
</head>
<body>
  <nav id="siteNav" aria-label="Meniu principal">
    <div class="brand">
      <div class="medal" aria-hidden="true">✚</div>
      <div>
        <h1>Holocaust Educațional</h1>
        <div style="color:rgba(255,255,255,0.8);font-size:0.95rem">Memorie • Istorie • Educație</div>
      </div>
    </div>

    <div class="controls" role="toolbar" aria-label="Control meniul">
      <input id="searchInput" class="search" type="search" placeholder="Caută pagini..." aria-label="Caută pagini în meniul de navigare">
      <button id="pinBtn" class="pin-btn" aria-pressed="false" title="Fixează meniul">Pin</button>
    </div>

    <div class="links" id="linksWrap" role="navigation" aria-label="Linkuri principale">
      <ul id="navList" role="menu">
        <li role="none"><a role="menuitem" href="istorie.html" target="continut">Istorie</a></li>
        <li role="none"><a role="menuitem" href="protagonisti.html" target="continut">Protagoniști</a></li>
        <li role="none"><a role="menuitem" href="holo.html" target="continut">Ceva Interesant</a></li>
        <li role="none"><a role="menuitem" href="biografie.html" target="continut">Biografie</a></li>
        <li role="none"><a role="menuitem" href="timeline.html" target="continut">Timeline</a></li>
        <li role="none"><a role="menuitem" href="feed.html" target="continut">Feedback</a></li>
        <li role="none"><a role="menuitem" href="joc.html" target="continut">Joc</a></li>
      </ul>
    </div>

    <div class="footer">
      <div class="hint">Alt + M — deschide/închide | Săgeți ↑/↓ — navigare | Enter — încarcă</div>
    </div>

    <div id="announce" class="sr-only" aria-live="polite"></div>
  </nav>

  <script>
    (function () {
      const navList = document.getElementById('navList');
      const links = Array.from(navList.querySelectorAll('a'));
      const searchInput = document.getElementById('searchInput');
      const pinBtn = document.getElementById('pinBtn');
      const announce = document.getElementById('announce');

      // state
      let focusedIndex = 0;
      let pinned = false;

      // Utility: announce for screen readers
      function a11y(msg) { announce.textContent = msg; setTimeout(()=>announce.textContent = '', 800); }

      // Focus first link
      function focusFirst() {
        const first = links.find(l => l.offsetParent !== null) || links[0];
        if (first) { first.focus(); focusedIndex = links.indexOf(first); }
      }

      // Expose for parent frame (if same-origin)
      window.navFocusFirst = focusFirst;
      window.navToggle = function(){ focusFirst(); }; // parent may call
      window.navOpen = () => !document.hidden; // placeholder

      // Filter logic
      function filterList(q) {
        const val = (q||'').trim().toLowerCase();
        links.forEach(a => {
          const li = a.parentElement;
          const text = a.textContent.trim().toLowerCase();
          const show = !val || text.includes(val);
          li.style.display = show ? '' : 'none';
        });
        // focus first visible
        const firstVisible = links.find(l => l.parentElement.style.display !== 'none');
        if (firstVisible) { firstVisible.focus(); focusedIndex = links.indexOf(firstVisible); }
      }
      searchInput.addEventListener('input', (e) => filterList(e.target.value));

      // Pin toggle
      function setPinned(v) {
        pinned = !!v;
        pinBtn.classList.toggle('active', pinned);
        pinBtn.setAttribute('aria-pressed', pinned ? 'true' : 'false');
        a11y(pinned ? 'Meniu fixat' : 'Meniu neinserat');
        try { sessionStorage.setItem('navPinned', pinned ? '1' : '0'); } catch(e){}
      }
      pinBtn.addEventListener('click', () => setPinned(!pinned));
      // restore pin state
      try { if (sessionStorage.getItem('navPinned') === '1') setPinned(true); } catch(e){}

      // Active link highlight (on click)
      function setActiveLink(a) {
        links.forEach(l => l.classList.toggle('active', l === a));
      }

      navList.addEventListener('click', (e) => {
        const a = e.target.closest('a');
        if (!a) return;
        setActiveLink(a);
        a11y('Se încarcă ' + (a.textContent || '').trim());
        // Ask parent to close menu unless pinned
        if (!pinned) {
          try { parent.postMessage({ type: 'close-nav' }, '*'); } catch(err){}
        }
        // Note: target="continut" will make content iframe load the page; parent closes nav on message
      });

      // Keyboard navigation: ArrowUp/Down, Home, End, Enter
      navList.addEventListener('keydown', (e) => {
        const visibles = links.filter(l => l.parentElement.style.display !== 'none');
        if (!visibles.length) return;
        const activeEl = document.activeElement;
        let idx = visibles.indexOf(activeEl);
        if (idx === -1) {
          idx = 0;
        }
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          idx = (idx + 1) % visibles.length;
          visibles[idx].focus();
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          idx = (idx - 1 + visibles.length) % visibles.length;
          visibles[idx].focus();
        } else if (e.key === 'Home') {
          e.preventDefault(); visibles[0].focus();
        } else if (e.key === 'End') {
          e.preventDefault(); visibles[visibles.length-1].focus();
        } else if (e.key === 'Enter' || e.key === ' ') {
          // let default click happen (Enter will activate link)
        }
      });

      // Listen for messages from parent (index.html)
      window.addEventListener('message', (ev) => {
        const data = ev.data || {};
        try {
          if (data && data.type === 'toggle-nav') {
            focusFirst();
            a11y('Meniu afișat');
          } else if (data && data.type === 'parent-nav-state') {
            if (data.open) { focusFirst(); a11y('Meniu afișat'); }
            else { a11y('Meniu ascuns'); }
          } else if (data && data.type === 'close-nav') {
            // parent asks to close: do nothing special here, parent will animate; we can blur
            document.activeElement && document.activeElement.blur();
            a11y('Meniu ascuns');
          } else if (data && data.type === 'open-nav') {
            focusFirst();
            a11y('Meniu afișat');
          }
        } catch(e){}
      });

      // Esc inside nav requests parent to close
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          try { parent.postMessage({ type: 'close-nav' }, '*'); } catch(err){}
        }
      });

      // Expose API to parent via direct access (same origin)
      window.__NAV_API = {
        focusFirst,
        setActiveByHref: (href) => {
          const a = links.find(l => l.getAttribute('href') === href);
          if (a) setActiveLink(a);
        }
      };

      // small enhancement: highlight link corresponding to parent's content src (optional)
      // Parent can send {type:'parent-content', src:'pagename.html'} to sync active state.

      // Initialize: focus first for keyboard users if container gets focus
      document.addEventListener('DOMContentLoaded', () => {
        // nothing automatic here; parent controls opening
      });
    })();
  </script>
</body>
</html>
